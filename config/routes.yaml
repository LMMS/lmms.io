index:
   path: /
   controller: App\Controller\IndexController::homepage

chat:
   path: /chat
   controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
   defaults:
      path: 'https://discord.gg/PruNxpG'
      permanent: true

bolresults:
   path: /bolresults
   controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
   defaults:
      path: 'https://docs.google.com/spreadsheets/u/3/d/e/2PACX-1vQl77UmX-OKujL7bG6IZ1xbjNDB2szc3StzPU7STX8d2M1Q4uRQaPxLiDd4b4W9xlljijTfQtrZH5tC/pubhtml'
      permanent: false

documentation:
   path: /documentation{wildcard}
   controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
   defaults:
      path: 'https://docs.lmms.io/user-manual/'
      permanent: true
   requirements:
      wildcard: .*

download:
   path: /download
   controller: App\Controller\DownloadController::page

download_pr:
   path: /download/pull-request/{id}
   controller: App\Controller\DownloadController::pull_request

download_artifact:
   path: /download/artifact/{id}
   controller: App\Controller\DownloadController::artifact

news:
   path: /news
   controller: App\Controller\NewsController::latest

news_show:
   path: /news/{date}
   controller: App\Controller\NewsController::show
   requirements:
      date: '\d{4}-\d{2}-\d{2}'

lsp_index:
    path: /lsp
    controller: App\Controller\Lsp\BrowseController::index

lsp_index_slash:
    path: /lsp/
    controller: App\Controller\Lsp\BrowseController::index

# Distributed LMMS demo project LICENSES.TXT files (and years of forum
# posts) link to /lsp/index.php?action=show&file=<id> — keep it routable.
lsp_index_php:
    path: /lsp/index.php
    controller: App\Controller\Lsp\BrowseController::index

lsp_settings:
    path: /lsp/settings
    controller: App\Controller\Lsp\AccountController::settings
    methods: [GET, POST]

lsp_register:
    path: /lsp/register
    controller: App\Controller\Lsp\AccountController::register
    methods: [GET, POST]

lsp_rate:
    path: /lsp/rate/{id}/{stars}
    controller: App\Controller\Lsp\SubmissionController::rate
    requirements:
        id: '\d+'
        stars: '[1-5]'

lsp_comment:
    path: /lsp/comment/{id}
    controller: App\Controller\Lsp\SubmissionController::addComment
    methods: [GET, POST]
    requirements:
        id: '\d+'

lsp_delete:
    path: /lsp/delete/{id}
    controller: App\Controller\Lsp\SubmissionController::deleteFile
    methods: [GET, POST]
    requirements:
        id: '\d+'

lsp_edit:
    path: /lsp/edit/{id}
    controller: App\Controller\Lsp\SubmissionController::editFile
    methods: [GET, POST]
    requirements:
        id: '\d+'

lsp_add:
    path: /lsp/add
    controller: App\Controller\Lsp\SubmissionController::addFile
    methods: [GET, POST]

lsp_download:
    path: /lsp/download/{id}
    controller: App\Controller\Lsp\DownloadController::download
    requirements:
        id: '\d+'

lsp_web_resources:
    path: /lsp/web_resources.php
    controller: App\Controller\Lsp\WebResourcesController::webResources

lsp_show:
    path: /lsp/{id}
    controller: App\Controller\Lsp\BrowseController::show
    requirements:
        id: '\d+'

lsp_login:
    path: /lsp/login
    controller: App\Controller\SecurityController::login

lsp_logout:
    path: /lsp/logout

lsp_captcha:
    path: /lsp/captcha
    controller: App\Controller\SecurityController::captcha

portal_pages:
   path: /{page}
   controller: App\Controller\PortalController::page
